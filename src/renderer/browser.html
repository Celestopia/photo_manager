<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhotoManager Browser Preview</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Render startup/runtime errors directly on page to avoid silent blank screens.
      function showRuntimeError(message) {
        const root = document.getElementById("app") || document.body;
        const box = document.createElement("pre");
        box.textContent = message;
        box.style.padding = "12px";
        box.style.margin = "12px";
        box.style.whiteSpace = "pre-wrap";
        box.style.border = "1px solid #c55";
        box.style.background = "#fff3f3";
        box.style.color = "#722";
        root.appendChild(box);
      }
      window.addEventListener("error", (event) => {
        showRuntimeError(`Runtime Error: ${event.message}\n${event.filename}:${event.lineno}:${event.colno}`);
      });
      window.addEventListener("unhandledrejection", (event) => {
        showRuntimeError(`Unhandled Promise Rejection:\n${event.reason?.stack || event.reason}`);
      });
    </script>
    <script src="/browser-api.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
