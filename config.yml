# PhotoManager application-level configuration.
# Library roots are selected in the application; each library stores its own data under .photo_manager/.

thumbnail:
  size: 320 # Target thumbnail square size in pixels (width = height = size).
  webpQuality: 80 # WebP encoding quality for thumbnails (1-100).
  extremeAspectRatio: 4 # Aspect-ratio threshold to treat an image as "extreme" (very tall / very wide). # Example: 4 means ratio >= 4:1 is considered extreme.
  maxConcurrency: 4 # Maximum concurrent workers used when generating thumbnail cache.

media:
  ffmpegDir: ./tools/ffmpeg/bin # Directory containing ffmpeg.exe and ffprobe.exe. Absolute paths are also supported.
  probeTimeoutSeconds: 30 # Maximum time allowed for probing one video.
  thumbnailTimeoutSeconds: 60 # Maximum time allowed for extracting one video thumbnail.
  videoThumbnailConcurrency: 1 # Maximum number of concurrent FFmpeg thumbnail workers.

backup:
  retentionCount: 10 # Maximum number of library data snapshots retained per library (minimum 1).

ui:
  language: zh-CN # UI language code.
  gallery:
    pageSize: 120 # Number of media items loaded per page request in gallery view.
    minCardWidth: 190 # Minimum card width (px) for responsive gallery layout.

  viewer:
    panelRatio:
      left: 1 # Default width ratio of the left metadata panel.
      center: 3 # Default width ratio of the center image panel.
      right: 1 # Default width ratio of the right customization panel.

    panels:
      showLeft: true # Whether the left panel is visible by default.
      showRight: true # Whether the right panel is visible by default.

    zoom:
      minPercent: 10 # Minimum zoom percentage allowed in viewer mode.
      maxPercent: 1000 # Maximum zoom percentage allowed in viewer mode.
      stepPercent: 10 # Base zoom step percentage for zoom controls. # Note: runtime logic can dynamically increase step at high zoom levels.
